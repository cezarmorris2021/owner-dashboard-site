<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSAG Command Center Elite</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: white;
}

header {
  padding: 20px;
  background: #111827;
  text-align: center;
  font-size: 22px;
}

.container {
  padding: 20px;
}

.card {
  background: #1f2937;
  padding: 20px;
  margin: 10px;
  border-radius: 12px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
}

button {
  padding: 10px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 6px;
}
</style>
</head>

<body>

<header>
SSAG COMMAND CENTER — SENTINEL ZERO
</header>

<div class="container">

<div class="grid">

<div class="card">
<h3>Daily Calls</h3>
<p id="calls">0</p>
<button onclick="addCall()">+1 Call</button>
</div>

<div class="card">
<h3>Appointments</h3>
<p id="appointments">0</p>
<button onclick="addAppointment()">+1 Appointment</button>
</div>

<div class="card">
<h3>Closed Deals</h3>
<p id="deals">0</p>
<button onclick="addDeal()">+1 Deal</button>
</div>

<div class="card">
<h3>Revenue</h3>
<p id="revenue">$0</p>
<button onclick="addRevenue()">+ Revenue</button>
</div>

</div>

</div>

<script>
let calls = 0;
let appointments = 0;
let deals = 0;
let revenue = 0;

function addCall(){
calls++;
document.getElementById("calls").innerText = calls;
}

function addAppointment(){
appointments++;
document.getElementById("appointments").innerText = appointments;
}

function addDeal(){
deals++;
document.getElementById("deals").innerText = deals;
}

function addRevenue(){
let amount = prompt("Enter amount:");
revenue += parseInt(amount);
document.getElementById("revenue").innerText = "$" + revenue;
}
</script>

</body>
</html>
